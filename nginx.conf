worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Backend API Upstreams
    upstream vpn_backend {
        server 127.0.0.1:5000;
    }

    upstream licensing_backend {
        server 127.0.0.1:8003;
    }

    # ==========================================
    # 1. MICROSOFT LICENSING SYSTEM (Port 80/443)
    # ==========================================
    server {
        listen       80;
        server_name  DCPLCMGRWEB01.secedu.qa localhost;
        root "C:/Microsoft-Licensing-system/frontend/build";
        index index.html;

        # Frontend Routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Backend API Proxy
        location /api {
            proxy_pass http://licensing_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen       443 ssl;
        server_name  DCPLCMGRWEB01.secedu.qa localhost;

        # SSL Configuration
        ssl_certificate      "C:/Microsoft-Licensing-system/Certs/Certificate.crt";
        ssl_certificate_key  "C:/Microsoft-Licensing-system/Certs/Private.key";

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        root "C:/Microsoft-Licensing-system/frontend/build";
        index index.html;

        # Frontend Routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Backend API Proxy
        location /api {
            proxy_pass http://licensing_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ==========================================
    # 2. VPN MANAGEMENT SYSTEM (Port 444)
    # ==========================================
    server {
        listen       444; # Keep on 444 to avoid conflict with Licensing System
        server_name  localhost;

        # Static Frontend Deployment Array
        root "C:/Users/Administrator/Documents/VPN MANAGEMENT SYSTEM/frontend/dist";
        index index.html index.htm;

        # Intercept and physically map all Root traffic cleanly to the React interface
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Dynamically Reverse-Proxy all /api requests down to the physical Node server
        location /api/ {
            proxy_pass http://vpn_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}